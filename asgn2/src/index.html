<!DOCTYPE html>
<html>
<head>
  <title>Blocky Sloth</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <canvas id="webgl" width="600" height="600"></canvas>

  <div id="controls">
    <p>Global Rotation</p>
    <input type="range" id="globalRotate" min="-180" max="180" value="0">

    <p>Left Down Upper Joint</p>
    <input type="range" id="upperArm" min="-70" max="70" value="0">

    <p>Left Down Lower Joint</p>
    <input type="range" id="forearm" min="-70" max="70" value="0">
    <br><br>

    <button id="animationOn">Animation On</button>
    <button id="animationOff">Animation Off</button>

    <p id="fps">FPS:</p>
    <span style="font-size: 11px; color: #666;">
        Crystal Li
        (jli864@ucsc.edu)
    </span>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
